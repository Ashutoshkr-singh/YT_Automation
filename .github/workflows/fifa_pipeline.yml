name: FIFA Automation Pipeline

on:
  schedule:
    # 16:00 UTC corresponds exactly to 9:30 PM IST
    - cron: '0 16 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Set up Node.js for Remotion
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Install Remotion dependencies
        run: |
          cd bouncy-subs
          npm install

      - name: Restore YouTube OAuth Token
        run: |
          echo "${{ secrets.YOUTUBE_TOKEN_BASE64 }}" | base64 --decode > token.pickle

      - name: Run Orchestrator Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONIOENCODING: "utf-8"
        run: |
          python orchestrator.py
