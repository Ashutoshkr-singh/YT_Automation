name: FIFA Automation Pipeline

on:
  schedule:
    # Run at minute 30 of every UTC hour (which is the top of the hour in IST)
    - cron: '30 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Set up Node.js for Remotion
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'bouncy-subs/package-lock.json'

      - name: Install Deno (JS runtime for yt-dlp)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /usr/bin/ffmpeg
          key: ffmpeg-${{ runner.os }}

      - name: Install FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Install Remotion dependencies
        run: |
          cd bouncy-subs
          npm ci --prefer-offline

      - name: Restore YouTube OAuth Token
        run: |
          echo "${{ secrets.YOUTUBE_TOKEN_BASE64 }}" | base64 --decode > token.pickle

      - name: Write fresh YouTube cookies
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" | base64 --decode > cookies.txt

      - name: Run Orchestrator Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONIOENCODING: "utf-8"
        run: |
          python orchestrator.py

      - name: Save Processed State
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add monitor_state.json || echo "No state file to add"
          git commit -m "Update processed video state [skip ci]" || echo "No changes to commit"
          git push || echo "No push needed"
